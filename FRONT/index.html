<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlacaScan</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="wrapper">
        <header>
            <div class="logo-badge"><span></span> Reconhecimento de Placas</div>
            <h1>Placa<em>Scan</em></h1>
            <p class="subtitle">Envie uma foto do veículo e identifique a placa em segundos.</p>
        </header>

        <div class="card">
            <div class="dropzone" id="dropzone">
                <input type="file" id="fileInput" accept="image/*" />
                <div class="drop-icon">
                    <svg fill="none" stroke-width="1.8" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                    </svg>
                </div>
                <p class="drop-title">Arraste a imagem ou clique para selecionar</p>
                <p class="drop-sub">JPG, PNG, WEBP — máx. 10 MB</p>
            </div>

            <div class="preview-wrap" id="previewWrap">
                <img id="previewImg" src="" alt="preview" />
                <button class="preview-remove" id="removeBtn">✕ Remover</button>
            </div>

            <div class="divider"></div>

            <button class="btn" id="scanBtn" disabled>
                <span class="btn-text">🔍 Identificar Placa</span>
                <span class="btn-loader">
                    <div class="spinner"></div>
                </span>
            </button>

            <div class="result-box" id="resultBox">
                <div class="result-header">✦ Placa identificada</div>
                <div class="result-body">
                    <span class="plate-text" id="plateText"></span>
                    <button class="copy-btn" id="copyBtn" title="Copiar placa">
                        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75" />
                        </svg>
                        Copiar
                    </button>
                </div>
            </div>

            <div id="stepsArea"
                style="display: none; margin-top: 32px; border-top: 1px solid var(--border); padding-top: 24px;">
                <p
                    style="font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 16px; text-transform: uppercase;">
                    Processamento Digital</p>
                <div id="stepsGallery"
                    style="display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px;">
                </div>
            </div>

            <div class="error-box" id="errorBox"></div>
        </div>
        <footer>PlacaScan &nbsp;·&nbsp; Powered by Luiz & Rafael</footer>
    </div>
</body>

</html>
